<div class="m5 r5">
        <button class="xs m5 mr0 test" title="Run the test silently, without opening Localisation app">Run</button>
        <button class="xs m5 mr0 load" title="Select all test parameters in Parameters app">Load</button>
        <button class="xs m5 mr0 primary disabled save" title="Save this test to User defined tests">Save</button>
        <button class="xs m5 mr0 rename" title="Rename this test (creates a user-defined copy if predefined)">Rename</button>
        <button class="xs m5 mr0 danger delete" title="Remove this test from User defined tests">Delete</button>
</div>
<div class="m10 mt0">
    
    <div class="results-label p5 pl10 strong">Results (0) :</div>
    <div class="results tl txs" style="position:relative"></div>
    <div class="comment-label mt5 p5 pl10 strong">Comment :</div>
    <textarea class="comment p5 tl tsm m5" style="width:calc(100% - 10px);margin:0 5px;min-height:60px;resize:vertical" placeholder="Notes about this test..."></textarea>
    <div class="params-label mt5 p5 pl10 strong">Parameters (0) :</div>
</div>
<div class="params list m10 mt0"></div>
