<!-- SCREEN: start -->
<div class="screen" id="screen-start">
    <div style="text-align:center;padding-bottom:24px">
        <img src="https://www.slicesecure.com/web/wp-content/uploads/2023/09/cropped-logo-e1695065411153-1-150x150.png" style="width:52px;height:52px" />
        <div style="font-size:18px;font-weight:bold;letter-spacing:5px;margin-top:8px">SLICE</div>
        <div class="op5 mt5" style="font-size:11px">No server. Direct connection.</div>
    </div>
    <button class="s1" id="btn-create">Create Offer <span class="role-tag">A</span></button>
    <button class="mt5" id="btn-join">Join with Offer <span class="role-tag">B</span></button>
</div>

<!-- SCREEN: offer (A) -->
<div class="screen hidden" id="screen-offer">
    <div class="op6 mb5" style="font-size:11px">Step 1 — Send this offer to peer B</div>
    <textarea class="signal-box" id="offer-text" readonly></textarea>
    <button class="mt5" id="btn-copy-offer">Copy Offer</button>
    <div class="op6 mt10 mb5" style="font-size:11px">Step 2 — Paste peer B's answer here</div>
    <textarea class="signal-box" id="answer-input" placeholder="Paste answer here…"></textarea>
    <button class="s1 mt5" id="btn-connect">Connect</button>
    <div id="offer-status" class="t3 mt5" style="font-size:11px;min-height:16px"></div>
</div>

<!-- SCREEN: join (B) -->
<div class="screen hidden" id="screen-join">
    <div class="op6 mb5" style="font-size:11px">Step 1 — Paste peer A's offer here</div>
    <textarea class="signal-box" id="offer-input" placeholder="Paste offer here…"></textarea>
    <button class="s1 mt5" id="btn-gen-answer">Generate Answer</button>
    <div id="answer-ready-label" class="op6 mt10 mb5 hidden" style="font-size:11px">Step 2 — Send this answer to peer A</div>
    <textarea class="signal-box hidden" id="answer-text" readonly></textarea>
    <button class="mt5 hidden" id="btn-copy-answer">Copy Answer</button>
    <div id="join-status" class="t3 mt5" style="font-size:11px;min-height:16px"></div>
</div>

<!-- SCREEN: connected -->
<div class="screen hidden" id="screen-connected">
    <div class="t3 mb15" style="font-size:12px;display:flex;align-items:center;gap:6px">
        <span class="conn-dot"></span>Connected
    </div>
    <div class="r3" style="gap:5px">
        <button id="btn-voice" class="mode-btn">
            <span class="icon icon-volume" style="font-size:20px;display:block;margin-bottom:5px"></span>
            Voice
        </button>
        <button id="btn-chat" class="mode-btn">
            <span class="icon icon-list" style="font-size:20px;display:block;margin-bottom:5px"></span>
            Chat
        </button>
        <button id="btn-video" class="mode-btn">
            <span class="icon icon-video" style="font-size:20px;display:block;margin-bottom:5px"></span>
            Video
        </button>
    </div>
    <button id="btn-disconnect" class="t5 mt15" style="background:none;border:none;font-size:11px;cursor:pointer;opacity:0.5;align-self:center">Disconnect</button>
</div>
