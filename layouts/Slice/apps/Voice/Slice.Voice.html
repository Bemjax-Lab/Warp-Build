<audio class="remote-audio" autoplay></audio>

<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px">
    <div class="avatar-wrap">
        <div class="avatar-ring r1"></div>
        <div class="avatar-ring r2"></div>
        <div class="s0 round" style="width:80px;height:80px;display:flex;align-items:center;justify-content:center">
            <span class="icon icon-user" style="font-size:28px;opacity:0.5"></span>
        </div>
    </div>
    <div class="call-status op8" style="font-size:16px">Connecting…</div>
</div>

<!-- incoming: accept / decline -->
<div class="ctrl-incoming p10 pb15 hidden" style="display:flex;justify-content:center;gap:32px;flex-shrink:0">
    <div style="display:flex;flex-direction:column;align-items:center;gap:5px;font-size:10px;opacity:0.7">
        <button class="btn-decline s5 round" style="width:60px;height:60px">
            <span class="icon icon-close" style="font-size:20px"></span>
        </button>
        Decline
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:5px;font-size:10px;opacity:0.7">
        <button class="btn-accept s3 round" style="width:60px;height:60px">
            <span class="icon icon-check" style="font-size:20px"></span>
        </button>
        Accept
    </div>
</div>

<!-- in-call: mute / end -->
<div class="ctrl-call p10 pb15 hidden" style="display:flex;justify-content:center;gap:20px;flex-shrink:0">
    <div style="display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;opacity:0.7">
        <button class="btn-mute round" style="width:56px;height:56px">
            <span class="icon icon-volume" style="font-size:20px"></span>
        </button>
        Mute
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;opacity:0.7">
        <button class="btn-end s5 round" style="width:56px;height:56px;transform:rotate(135deg)">
            <span class="icon icon-phone" style="font-size:20px;display:block;transform:rotate(-135deg)"></span>
        </button>
        End
    </div>
</div>
