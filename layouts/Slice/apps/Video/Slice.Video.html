<video class="remote-video" autoplay playsinline style="flex:1;width:100%;object-fit:cover;background:#000;display:block;min-height:0"></video>
<video class="local-video" autoplay playsinline muted style="position:absolute;top:10px;right:10px;width:88px;height:118px;object-fit:cover;border-radius:6px;border:1px solid rgba(128,128,128,.2);background:#111;z-index:2"></video>

<div style="position:absolute;top:0;left:0;right:0;padding:8px 12px;font-size:11px;opacity:0.7;pointer-events:none;z-index:3;background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent)">
    <span class="status-text">Connecting…</span>
</div>

<div class="p10 pb15" style="display:flex;justify-content:center;gap:16px;flex-shrink:0;position:relative;z-index:3">
    <button class="btn-mute round" style="width:52px;height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:9px">
        <span class="icon icon-volume" style="font-size:16px"></span>
        Mute
    </button>
    <button class="btn-end s5 round" style="width:52px;height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:9px;transform:rotate(135deg)">
        <span class="icon icon-phone" style="font-size:16px;transform:rotate(-135deg);display:block"></span>
        <span style="transform:rotate(-135deg);display:block">End</span>
    </button>
    <button class="btn-cam round" style="width:52px;height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:9px">
        <span class="icon icon-camera" style="font-size:16px"></span>
        Cam
    </button>
</div>
