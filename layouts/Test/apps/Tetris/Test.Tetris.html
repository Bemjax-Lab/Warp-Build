<canvas class="game-canvas"></canvas>
<div class="hud">
    <div class="hud-next-label">Next</div>
    <canvas class="hud-next-canvas"></canvas>
    <div class="hud-score">Score<br><span class="hud-score-val">0</span></div>
    <div class="hud-level">Level<br><span class="hud-level-val">1</span></div>
    <div class="hud-lines">Lines<br><span class="hud-lines-val">0</span></div>
</div>
<div class="game-over">
    <div class="go-title">GAME OVER</div>
    <div class="go-score">Score: <span class="go-score-val">0</span></div>
    <button class="go-restart">Play Again</button>
</div>
