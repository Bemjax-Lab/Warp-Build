<div class="xs p10">
    <div class="sec">Theme</div>
    <div class="mb10">
        <select class="theme">
            <option value="vs-dark" selected>Dark</option>
            <option value="vs">Light</option>
            <option value="hc-black">High Contrast</option>
        </select>
    </div>

    <div class="sec">Font</div>
    <div class="mb10">
        <select class="font">
            <option value="Consolas">Consolas</option>
            <option value="Fira Code">Fira Code</option>
            <option value="JetBrains Mono">JetBrains Mono</option>
            <option value="Source Code Pro">Source Code Pro</option>
            <option value="Courier New">Courier New</option>
            <option value="monospace">monospace</option>
        </select>
    </div>

    <div class="sec">Font Size</div>
    <div class="mb10">
        <label class="mb10">Size <input type="range" class="font-size" min="10" max="28" step="1" value="13"><span class="val">13</span></label>
    </div>

    <div class="sec">Tab Size</div>
    <div class="mb10">
        <select class="tab-size">
            <option value="2">2</option>
            <option value="4" selected>4</option>
            <option value="8">8</option>
        </select>
    </div>

    <div class="sec">Language</div>
    <div class="mb10">
        <select class="language">
            <option value="javascript" selected>JavaScript</option>
            <option value="typescript">TypeScript</option>
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="json">JSON</option>
            <option value="markdown">Markdown</option>
            <option value="python">Python</option>
            <option value="xml">XML</option>
            <option value="sql">SQL</option>
            <option value="plaintext">Plain Text</option>
        </select>
    </div>

    <div class="sec">Options</div>
    <div class="mb10">
        <label class="mb10"><input type="checkbox" class="minimap"> Minimap</label>
        <label class="mb10"><input type="checkbox" class="wordwrap"> Word Wrap</label>
        <label class="mb10"><input type="checkbox" class="linenums" checked> Line Numbers</label>
        <label class="mb10"><input type="checkbox" class="ligatures"> Font Ligatures</label>
    </div>
</div>
