<div class="xs">

    <div class="p5 m5 mt10 mb-10">
      <div class="r6">
        <label class="c2">Target manager</label>
        <select class="c3 wb-mgr"></select>
        <button class="wb-new-mgr"><span class="icon icon-plus"></span></button>
      </div>
    </div>

    <div class="r3 mt-5" style="gap:3px">
      <div class="p5 m5 c1">
        <div class="sec">Window</div>
        <div class="r6"><label class="c2">Name</label><input class="c4 wb-name" type="text" value="" placeholder="auto" /></div>
        <div class="r6"><label class="c2">Caption</label><input class="c4 wb-cap" type="text" value="Test" /></div>
        <div class="r6"><label class="c2">Image</label><input class="c4 wb-img" type="text" placeholder="icon URL" /></div>
      </div>
      <div class="c2 p5 m5">
        <div class="sec">Size / Position</div>
        <div class="r2" style="gap:3px">
          <div class="r6"><label class="c2">Width</label><input class="c4 wb-w" type="number" value="320" /></div>
          <div class="r6"><label class="c2">Height</label><input class="c4 wb-h" type="number" value="480" /></div>
        </div>
        <div class="r2" style="gap:3px">
          <div class="r6"><label class="c2">X</label><input class="c4 wb-x" type="number" value="0" /></div>
          <div class="r6"><label class="c2">Y</label><input class="c4 wb-y" type="number" value="0" /></div>
        </div>
        <div class="r2" style="gap:3px">
          <div class="r6"><label class="c2">Min W</label><input class="c4 wb-minw" type="number" value="320" /></div>
          <div class="r6"><label class="c2">Min H</label><input class="c4 wb-minh" type="number" value="200" /></div>
        </div>
        <div class="r2" style="gap:3px">
          <div class="r6"><label class="c2">Max W</label><input class="c4 wb-maxw" type="number" value="" placeholder="none" /></div>
          <div class="r6"><label class="c2">Max H</label><input class="c4 wb-maxh" type="number" value="" placeholder="none" /></div>
        </div>
      </div>
    </div>

    <div class="r2" style="gap:3px">
      <div class="p5 m5">
        <div class="sec">State</div>
        <div class="r6">
          <label class="c2">State</label>
          <select class="c4 wb-state">
            <option value="1" selected>1 – restored</option>
            <option value="0">0 – hidden</option>
            <option value="2">2 – minimized</option>
            <option value="3">3 – maximized</option>
            <option value="4">4 – fullscreen</option>
          </select>
        </div>
        <div class="r6"><label class="c2">Classes</label><input class="c4 wb-classes" type="text" placeholder="extra CSS classes" /></div>
        <div class="r6"><label class="c2">Backdrop op.</label><input class="c4 wb-bdop" type="number" value="0.7" min="0" max="1" step="0.1" /></div>
      </div>
      <div class="m5">
        <div class="sec">Flags</div>
        <div class="r2">
          <label><input class="wb-draggable" type="checkbox" checked /> draggable</label>
          <label><input class="wb-scrollable" type="checkbox" checked /> scrollable</label>
          <label><input class="wb-scalable" type="checkbox" checked /> scalable</label>
          <label><input class="wb-headless" type="checkbox" /> headless</label>
          <label><input class="wb-close" type="checkbox" checked /> close</label>
          <label><input class="wb-minimize" type="checkbox" checked /> minimize</label>
          <label><input class="wb-maximize" type="checkbox" checked /> maximize</label>
          <label><input class="wb-keepRatio" type="checkbox" /> keepRatio</label>
          <label><input class="wb-destroyOnHide" type="checkbox" /> destroyOnHide</label>
          <label><input class="wb-activateOnShow" type="checkbox" checked /> activateOnShow</label>
          <label><input class="wb-backdrop" type="checkbox" /> backdrop</label>
          <label><input class="wb-backdropCloses" type="checkbox" checked /> backdropCloses</label>
        </div>
      </div>
    </div>

    <div class="p5 r2" style="gap:3px">
      <div class="m5">
        <div class="sec">Anchor from (this window)</div>
        <div class="r6 p5"><label class="c2">X</label>
          <select class="c4 wb-fx"><option>min</option><option selected>mid</option><option>max</option></select>
        </div>
        <div class="r6"><label class="c2">Y</label>
          <select class="c4 wb-fy"><option>min</option><option selected>mid</option><option>max</option></select>
        </div>
      </div>
      <div class="m5">
        <div class="sec">Anchor to (target)</div>
        <div class="r6 p5"><label class="c2">Parent</label>
          <select class="c4 wb-parent"><option value="">(viewport)</option></select>
        </div>
        <div class="r6"><label class="c2">X</label>
          <select class="c4 wb-tx"><option>min</option><option selected>mid</option><option>max</option></select>
        </div>
        <div class="r6"><label class="c2">Y</label>
          <select class="c4 wb-ty"><option>min</option><option selected>mid</option><option>max</option></select>
        </div>
      </div>
    </div>

    <div class="p5 mt5 r2" style="gap:3px">
      <button class="s1 md wb-go"><span class="icon icon-plus"></span> Create Window</button>
      <button class="s5 md wb-clear"><span class="icon icon-trash"></span> Kill All</button>
    </div>

    <div class="p5 mt5">
      <div class="sec">Created windows</div>
      <div class="wb-list"></div>
    </div>

</div>
